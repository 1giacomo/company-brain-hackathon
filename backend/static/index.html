<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Al Dente OS</title>
<style>
  :root {
    --bg: #0c0e13; --bg2: #11141c; --dot: #232838;
    --panel: #161a22; --panel2: #1d222c; --border: #2a3040;
    --text: #e8eaed; --muted: #9aa3b2;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif; color: var(--text);
    background:
      radial-gradient(circle at 50% 0%, #1a1f2e 0%, var(--bg) 60%),
      var(--bg);
    user-select: none;
  }
  /* Dotted overlay */
  #desktop {
    position: fixed; inset: 0;
    background-image: radial-gradient(var(--dot) 1.4px, transparent 1.4px);
    background-size: 24px 24px; background-position: -12px -12px;
  }

  /* Top menu bar */
  #menubar {
    position: fixed; top: 0; left: 0; right: 0; height: 32px; z-index: 9000;
    display: flex; align-items: center; gap: 16px; padding: 0 16px;
    background: rgba(18,21,28,.72); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  #menubar .brand { font-weight: 700; letter-spacing: .4px; }
  #menubar .brand .pasta { margin-right: 7px; }
  #menubar .spacer { flex: 1; }
  #menubar .clock { color: var(--muted); font-variant-numeric: tabular-nums; }

  /* Desktop icons */
  #icons { position: fixed; top: 52px; left: 26px; z-index: 10;
    display: flex; flex-direction: column; gap: 26px; }
  .icon { width: 96px; display: flex; flex-direction: column; align-items: center;
    gap: 8px; cursor: pointer; border-radius: 12px; padding: 8px 4px; }
  .icon:hover { background: rgba(255,255,255,.05); }
  .icon .art { width: 66px; height: 66px; filter: drop-shadow(0 6px 14px rgba(0,0,0,.55));
    transition: transform .15s ease; }
  .icon:hover .art { transform: translateY(-3px) scale(1.05); }
  .icon .label { font-size: 12.5px; text-align: center; line-height: 1.2;
    text-shadow: 0 1px 3px rgba(0,0,0,.8); }

  /* Windows */
  .window { position: fixed; min-width: 360px; min-height: 240px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 24px 70px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.02) inset;
    display: flex; flex-direction: column; overflow: hidden; }
  .window.minimized { display: none; }
  .titlebar { height: 38px; flex: none; display: flex; align-items: center; gap: 10px;
    padding: 0 10px 0 13px; background: linear-gradient(var(--panel2), var(--panel));
    border-bottom: 1px solid var(--border); cursor: grab; }
  .titlebar.grabbing { cursor: grabbing; }
  .titlebar .ti { width: 18px; height: 18px; flex: none; }
  .titlebar .tt { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .titlebar .btns { display: flex; gap: 7px; }
  .tbtn { width: 13px; height: 13px; border-radius: 50%; border: none; cursor: pointer;
    padding: 0; position: relative; }
  .tbtn.min { background: #f1c40f; } .tbtn.close { background: #e0533d; }
  .tbtn:hover { filter: brightness(1.15); }
  .window iframe { flex: 1; width: 100%; border: 0; background: var(--bg2); }
  .resize { position: absolute; width: 16px; height: 16px; right: 0; bottom: 0;
    cursor: nwse-resize; z-index: 2; }
  .resize::after { content: ""; position: absolute; right: 3px; bottom: 3px;
    width: 7px; height: 7px; border-right: 2px solid var(--muted); border-bottom: 2px solid var(--muted); }

  /* Dock */
  #dock { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    z-index: 9000; display: flex; gap: 10px; padding: 8px 12px; min-height: 18px;
    background: rgba(22,26,34,.7); backdrop-filter: blur(14px);
    border: 1px solid var(--border); border-radius: 16px; transition: opacity .2s; }
  #dock:empty { opacity: 0; }
  .dock-item { display: flex; align-items: center; gap: 7px; cursor: pointer;
    background: rgba(255,255,255,.04); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 5px 11px 5px 7px; font-size: 12.5px; }
  .dock-item:hover { background: rgba(255,255,255,.1); }
  .dock-item img { width: 18px; height: 18px; }
  .dock-item .live { width: 5px; height: 5px; border-radius: 50%; background: #4caf7d; }
</style>
</head>
<body>
<div id="desktop"></div>

<div id="menubar">
  <span class="brand"><span class="pasta">🍝</span>Al Dente OS</span>
  <span class="spacer"></span>
  <span class="clock" id="clock"></span>
</div>

<div id="icons"></div>
<div id="dock"></div>

<script>
// ---- App registry --------------------------------------------------------
const APPS = {
  brain:  { title: "Company Brain", hue: 268, glyph: "brain",  w: 1040, h: 660 },
  kb:     { title: "Knowledge Base", hue: 41,  glyph: "files", w: 900,  h: 600 },
  rag:    { title: "RAG",            hue: 168, glyph: "search", w: 760,  h: 560 },
  tables: { title: "API Tables",     hue: 212, glyph: "grid",   w: 1000, h: 600 },
};
const ICON_ORDER = ["brain", "kb", "rag", "tables"];

// ---- Discomorphism icon generator (disco-ball sphere + glyph) ------------
function discoIcon(hue, glyph) {
  // Build a mosaic of facets with per-tile lightness jitter (deterministic).
  const N = 9, R = 50, cx = 50, cy = 50;
  let tiles = "";
  let seed = hue * 7 + 13;
  const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  const step = (2 * R) / N;
  for (let i = 0; i < N; i++) {
    for (let j = 0; j < N; j++) {
      const x = cx - R + i * step, y = cy - R + j * step;
      const dx = (x + step / 2 - cx), dy = (y + step / 2 - cy);
      if (dx * dx + dy * dy > R * R) continue;            // clip to circle
      const shade = 28 + rnd() * 34 - (dy / R) * 14;      // top brighter
      const sat = 55 + rnd() * 20;
      tiles += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${step.toFixed(1)}" height="${step.toFixed(1)}"
        fill="hsl(${hue} ${sat.toFixed(0)}% ${shade.toFixed(0)}%)" opacity="0.92"/>`;
    }
  }
  const glyphSvg = GLYPHS[glyph] || "";
  return `<svg class="art" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="g${hue}" cx="38%" cy="32%" r="75%">
        <stop offset="0%" stop-color="hsl(${hue} 70% 72%)"/>
        <stop offset="45%" stop-color="hsl(${hue} 65% 46%)"/>
        <stop offset="100%" stop-color="hsl(${hue} 70% 20%)"/>
      </radialGradient>
      <clipPath id="c${hue}"><circle cx="50" cy="50" r="50"/></clipPath>
      <radialGradient id="s${hue}" cx="34%" cy="28%" r="40%">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <g clip-path="url(#c${hue})">
      <circle cx="50" cy="50" r="50" fill="url(#g${hue})"/>
      <g style="mix-blend-mode:overlay">${tiles}</g>
      <circle cx="50" cy="50" r="50" fill="url(#s${hue})"/>
      <circle cx="50" cy="50" r="49" fill="none" stroke="hsl(${hue} 60% 12%)" stroke-width="2" opacity="0.6"/>
      <g transform="translate(50,50)" fill="#0c0e13" opacity="0.92">${glyphSvg}</g>
    </g>
  </svg>`;
}
const GLYPHS = {
  // Spotify-style stacked arcs (Company Brain)
  brain: `<path d="M-20 -8 A28 28 0 0 1 20 -8" stroke="#0c0e13" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M-16 2 A22 22 0 0 1 16 2" stroke="#0c0e13" stroke-width="6" fill="none" stroke-linecap="round"/>
          <path d="M-11 11 A15 15 0 0 1 11 11" stroke="#0c0e13" stroke-width="6" fill="none" stroke-linecap="round"/>`,
  // Stacked documents
  files: `<rect x="-16" y="-18" width="26" height="32" rx="2.5"/>
          <rect x="-9" y="-12" width="26" height="32" rx="2.5" opacity="0.55"/>`,
  // Magnifier over a doc
  search: `<rect x="-20" y="-18" width="26" height="34" rx="2.5" opacity="0.55"/>
           <circle cx="9" cy="6" r="11" fill="none" stroke="#0c0e13" stroke-width="5"/>
           <line x1="17" y1="14" x2="24" y2="21" stroke="#0c0e13" stroke-width="5" stroke-linecap="round"/>`,
  // Grid / table
  grid: `<rect x="-19" y="-19" width="38" height="38" rx="3" fill="none" stroke="#0c0e13" stroke-width="4.5"/>
         <line x1="-19" y1="-3" x2="19" y2="-3" stroke="#0c0e13" stroke-width="3.5"/>
         <line x1="-19" y1="9" x2="19" y2="9" stroke="#0c0e13" stroke-width="3.5"/>
         <line x1="-3" y1="-19" x2="-3" y2="19" stroke="#0c0e13" stroke-width="3.5"/>`,
};

// ---- Window manager ------------------------------------------------------
const desktop = document.getElementById('desktop');
const dock = document.getElementById('dock');
let zTop = 100, openWins = {}, cascade = 0;

function focusWin(id) {
  const w = openWins[id]; if (!w) return;
  w.el.style.zIndex = ++zTop;
}

function openApp(id) {
  const meta = APPS[id];
  if (openWins[id]) {                       // already open → restore + focus
    openWins[id].el.classList.remove('minimized');
    focusWin(id);
    return;
  }
  const vw = window.innerWidth, vh = window.innerHeight;
  const w = Math.min(meta.w, vw - 60), h = Math.min(meta.h, vh - 110);
  const left = Math.max(120, (vw - w) / 2 + (cascade % 5) * 28 - 56);
  const top = Math.max(44, (vh - h) / 2 + (cascade % 5) * 24 - 48);
  cascade++;

  const el = document.createElement('div');
  el.className = 'window';
  el.style.cssText = `left:${left}px;top:${top}px;width:${w}px;height:${h}px;z-index:${++zTop}`;
  el.innerHTML = `
    <div class="titlebar">
      <span class="ti">${discoIcon(meta.hue, meta.glyph)}</span>
      <span class="tt">${meta.title}</span>
      <span class="btns">
        <button class="tbtn min" title="Minimize"></button>
        <button class="tbtn close" title="Close"></button>
      </span>
    </div>
    <iframe src="/apps/${id}" title="${meta.title}"></iframe>
    <div class="resize"></div>`;
  // titlebar art sizing
  el.querySelector('.ti .art').style.width = '18px';
  el.querySelector('.ti .art').style.height = '18px';
  desktop.appendChild(el);
  openWins[id] = { el };

  el.addEventListener('mousedown', () => focusWin(id), true);
  el.querySelector('.tbtn.close').onclick = () => closeApp(id);
  el.querySelector('.tbtn.min').onclick = () => { el.classList.add('minimized'); };
  makeDraggable(id, el, el.querySelector('.titlebar'));
  makeResizable(el, el.querySelector('.resize'));
  renderDock();
}

function closeApp(id) {
  const w = openWins[id]; if (!w) return;
  w.el.remove(); delete openWins[id]; renderDock();
}

function makeDraggable(id, el, handle) {
  let sx, sy, ox, oy, dragging = false;
  handle.addEventListener('mousedown', (e) => {
    if (e.target.closest('.tbtn')) return;
    dragging = true; handle.classList.add('grabbing');
    sx = e.clientX; sy = e.clientY;
    ox = el.offsetLeft; oy = el.offsetTop; focusWin(id);
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    let nl = ox + e.clientX - sx, nt = oy + e.clientY - sy;
    nl = Math.max(-el.offsetWidth + 90, Math.min(nl, window.innerWidth - 60));
    nt = Math.max(32, Math.min(nt, window.innerHeight - 44));
    el.style.left = nl + 'px'; el.style.top = nt + 'px';
  });
  window.addEventListener('mouseup', () => { dragging = false; handle.classList.remove('grabbing'); });
}

function makeResizable(el, grip) {
  let sx, sy, ow, oh, resizing = false;
  grip.addEventListener('mousedown', (e) => {
    resizing = true; sx = e.clientX; sy = e.clientY;
    ow = el.offsetWidth; oh = el.offsetHeight; e.preventDefault(); e.stopPropagation();
  });
  window.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    el.style.width = Math.max(360, ow + e.clientX - sx) + 'px';
    el.style.height = Math.max(240, oh + e.clientY - sy) + 'px';
  });
  window.addEventListener('mouseup', () => { resizing = false; });
}

function renderDock() {
  dock.innerHTML = '';
  Object.keys(openWins).forEach(id => {
    const meta = APPS[id];
    const d = document.createElement('div');
    d.className = 'dock-item';
    d.innerHTML = `<span class="live"></span>${discoIcon(meta.hue, meta.glyph)}<span>${meta.title}</span>`;
    d.querySelector('.art').style.width = '18px';
    d.querySelector('.art').style.height = '18px';
    d.onclick = () => openApp(id);
    dock.appendChild(d);
  });
}

// ---- Desktop icons -------------------------------------------------------
const iconsEl = document.getElementById('icons');
ICON_ORDER.forEach(id => {
  const meta = APPS[id];
  const ic = document.createElement('div');
  ic.className = 'icon';
  ic.innerHTML = `${discoIcon(meta.hue, meta.glyph)}<span class="label">${meta.title}</span>`;
  ic.ondblclick = () => openApp(id);
  let lastTap = 0;
  ic.onclick = () => { const t = Date.now(); if (t - lastTap < 400) openApp(id); lastTap = t; };
  iconsEl.appendChild(ic);
});

// ---- Clock ---------------------------------------------------------------
function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short' }) + '  ' +
    d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
tick(); setInterval(tick, 10000);

// Open Company Brain by default so the page is alive on first load.
openApp('brain');
</script>
</body>
</html>
