<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Knowledge Base</title>
<style>
  :root { --bg:#11141c; --panel:#161a22; --panel2:#1d222c; --border:#2a3040;
    --text:#e8eaed; --muted:#9aa3b2; --accent:#e0b341; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:flex; font-family:-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden; }
  .sidebar { width:300px; flex:none; border-right:1px solid var(--border); display:flex;
    flex-direction:column; background:var(--panel); }
  .search { padding:12px; border-bottom:1px solid var(--border); }
  .search input { width:100%; padding:8px 11px; border-radius:8px; border:1px solid var(--border);
    background:#0c0e13; color:var(--text); font-size:13px; }
  .search input:focus { outline:none; border-color:var(--accent); }
  .list { flex:1; overflow-y:auto; padding:6px; }
  .group-title { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--muted);
    padding:12px 10px 5px; }
  .file { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:7px;
    cursor:pointer; font-size:13px; }
  .file:hover { background:var(--panel2); }
  .file.active { background:rgba(224,179,65,.14); }
  .file .ic { font-size:15px; }
  .file .nm { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .file .id { font:11px ui-monospace,monospace; color:var(--muted); }
  .viewer { flex:1; display:flex; flex-direction:column; min-width:0; }
  .vbar { height:40px; flex:none; display:flex; align-items:center; gap:10px; padding:0 16px;
    border-bottom:1px solid var(--border); background:var(--panel2); font-size:13px; color:var(--muted); }
  .vbar .vt { color:var(--accent); font:13px ui-monospace,monospace; }
  iframe { flex:1; width:100%; border:0; background:#fff; }
  .empty { flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted);
    font-size:14px; text-align:center; padding:30px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="search"><input id="q" placeholder="Filter documents…" autocomplete="off" /></div>
  <div class="list" id="list"></div>
</div>
<div class="viewer">
  <div class="vbar"><span id="vt" class="vt">—</span><span id="vsub"></span></div>
  <div class="empty" id="empty">Select a document from the left to read it.</div>
  <iframe id="frame" title="Document" style="display:none"></iframe>
</div>

<script>
let docs = [];
const listEl = document.getElementById('list');
const frame = document.getElementById('frame');
const empty = document.getElementById('empty');

function categorize(d) {
  const t = d.title.toLowerCase();
  if (t.includes('price list')) return 'Price list';
  if (t.includes('spec') || t.includes('specification')) return 'Product specifications';
  if (t.includes('capitolato') || t.includes('supply specification')) return 'Customer requirements';
  if (t.includes('policy') || t.includes('procedure') || t.includes('plan') ||
      t.includes('agreement') || t.includes('haccp') || t.includes('note') ||
      t.includes('program') || t.includes('summary') || t.includes('monitoring')) return 'Policies & procedures';
  return 'Other';
}
const GROUP_ORDER = ['Product specifications','Price list','Customer requirements','Policies & procedures','Other'];

function render(filter='') {
  listEl.innerHTML = '';
  const f = filter.toLowerCase();
  const shown = docs.filter(d => !f || d.title.toLowerCase().includes(f) || d.doc_id.toLowerCase().includes(f));
  const groups = {};
  shown.forEach(d => { (groups[categorize(d)] ||= []).push(d); });
  GROUP_ORDER.forEach(g => {
    if (!groups[g]) return;
    const gt = document.createElement('div'); gt.className = 'group-title';
    gt.textContent = `${g} · ${groups[g].length}`; listEl.appendChild(gt);
    groups[g].forEach(d => {
      const row = document.createElement('div'); row.className = 'file'; row.dataset.id = d.doc_id;
      const variant = d.is_bio ? ' 🌱' : '';
      row.innerHTML = `<span class="ic">📄</span>
        <span class="nm">${d.title}${variant}</span>
        <span class="id">${d.doc_id}</span>`;
      row.onclick = () => openDoc(d);
      listEl.appendChild(row);
    });
  });
}

function openDoc(d) {
  document.querySelectorAll('.file').forEach(f => f.classList.toggle('active', f.dataset.id === d.doc_id));
  document.getElementById('vt').textContent = d.doc_id;
  document.getElementById('vsub').textContent = d.title;
  empty.style.display = 'none';
  frame.style.display = 'block';
  frame.src = '/kb/' + d.doc_id;
}

document.getElementById('q').addEventListener('input', e => render(e.target.value));

fetch('/api/kb/list').then(r => r.json()).then(data => {
  docs = data.documents || [];
  render();
}).catch(() => { listEl.innerHTML = '<div class="empty">Could not load documents.</div>'; });
</script>
</body>
</html>
