<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Al Dente · Company Brain</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181b22;
      --panel2: #1f232c;
      --border: #2a2f3a;
      --text: #e8eaed;
      --muted: #9aa3b2;
      --accent: #e0b341;
      --accent2: #c0392b;
      --green: #4caf7d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .col {
      display: flex;
      flex-direction: column;
      height: 100vh;
      position: relative;
    }

    /* Chat */
    /* Block layout (not flex) for the message list — avoids a flex cross-axis quirk
     that collapsed bubbles to min-content. Bubbles align via margin auto. */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 18px 6px;
      display: block;
    }

    .msg {
      width: fit-content;
      max-width: 80%;
      margin: 0 0 14px;
      padding: 11px 14px;
      border-radius: 15px;
      line-height: 1.5;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .3), inset 0 1px 0 rgba(255, 255, 255, .06);
    }

    .msg.bot:has(.frame) {
      width: 80%;
    }

    /* inline HTML decks need room */
    .msg.user {
      margin-left: auto;
      color: #1a1407;
      border-bottom-right-radius: 4px;
      background: linear-gradient(180deg, #ecc35a, var(--accent));
      box-shadow: 0 2px 8px rgba(224, 179, 65, .3), inset 0 1px 0 rgba(255, 255, 255, .5);
    }

    .msg.bot {
      margin-right: auto;
      border: 1px solid rgba(255, 255, 255, .06);
      border-bottom-left-radius: 4px;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
    }

    .msg.bot .answer {
      white-space: normal;
      overflow-wrap: break-word;
    }

    .msg.bot .answer.md {
      white-space: normal;
      overflow-wrap: break-word;
    }

    .answer.md p {
      margin: 0 0 8px;
    }

    .answer.md p:last-child {
      margin-bottom: 0;
    }

    .answer.md ul,
    .answer.md ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .answer.md li {
      margin: 2px 0;
    }

    .answer.md h1,
    .answer.md h2,
    .answer.md h3 {
      margin: 10px 0 6px;
      font-size: 15px;
    }

    .answer.md code {
      background: #0c0e13;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: ui-monospace, monospace;
      font-size: 12.5px;
    }

    .answer.md pre {
      background: #0c0e13;
      padding: 10px;
      border-radius: 7px;
      overflow-x: auto;
    }

    .answer.md pre code {
      padding: 0;
    }

    .answer.md table {
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 13px;
      display: block;
      max-width: 100%;
      overflow-x: auto;
    }

    .frame {
      max-width: 100%;
    }

    .answer.md th,
    .answer.md td {
      border: 1px solid var(--border);
      padding: 4px 9px;
      text-align: left;
    }

    .answer.md th {
      background: var(--panel);
    }

    .answer.md a {
      color: var(--green);
    }

    .answer.md strong {
      color: #fff;
    }

    .msg.user .answer.md {
      color: #1a1407;
    }

    .msg.user .answer.md strong {
      color: #1a1407;
    }

    .msg.user .answer.md code {
      background: rgba(0, 0, 0, .12);
    }

    .msg.user .answer.md a {
      color: #5a3d00;
    }

    .meta {
      margin-top: 9px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .chip {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #131620;
      color: var(--muted);
    }

    .chip.vert {
      color: var(--accent);
      border-color: var(--accent);
    }

    .chip.src {
      font-family: ui-monospace, monospace;
    }

    a.chip.doc {
      color: var(--green);
      border-color: var(--green);
      cursor: pointer;
      text-decoration: none;
    }

    a.chip.doc:hover {
      background: var(--green);
      color: #0c0e13;
    }

    .artifact {
      margin-top: 9px;
    }

    .artifact a {
      color: var(--green);
      font-weight: 600;
    }

    .frame {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .frame iframe {
      width: 100%;
      border: 0;
      height: 320px;
      display: block;
    }

    .spinner {
      color: var(--muted);
      font-size: 13px;
    }

    .examples {
      padding: 0 18px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .examples button {
      background: var(--panel2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 5px 11px;
      font-size: 12px;
      cursor: pointer;
    }

    .examples button:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    form {
      display: flex;
      gap: 9px;
      padding: 14px 18px;
      border-top: 1px solid rgba(0, 0, 0, .4);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .05);
    }

    #q {
      flex: 1;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, .5);
      background: #0a0c11;
      color: var(--text);
      font-size: 14px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, .5), inset 0 -1px 0 rgba(255, 255, 255, .04);
    }

    #q:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, .5), 0 0 0 3px rgba(224, 179, 65, .18);
    }

    button.send {
      color: #1a1407;
      border: 0;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      background: linear-gradient(180deg, #f0cb63, var(--accent));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .6), 0 2px 6px rgba(0, 0, 0, .4);
    }

    button.send:hover {
      filter: brightness(1.05);
    }

    button.send:active {
      transform: translateY(1px);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, .3);
    }

    button.send:disabled {
      opacity: .5;
      cursor: default;
    }

    /* ── Companion buddy: "Fusilli" the pasta-bot ───────────────────────── */
    #buddy {
      position: absolute;
      right: 20px;
      bottom: 86px;
      z-index: 6;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }

    #buddy .bubble {
      pointer-events: none;
      max-width: 200px;
      font-size: 12.5px;
      line-height: 1.35;
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid rgba(255, 255, 255, .08);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 14px;
      position: relative;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, .45), inset 0 1px 0 rgba(255, 255, 255, .08);
      opacity: 0;
      transform: translateY(6px) scale(.96);
      transition: opacity .25s ease, transform .25s ease;
    }

    #buddy.show .bubble {
      opacity: 1;
      transform: none;
    }

    #buddy .bubble::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: 16px;
      width: 12px;
      height: 12px;
      background: var(--panel);
      border-right: 1px solid rgba(255, 255, 255, .08);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      transform: rotate(-45deg);
    }

    /* Scoped to the mascot SVG only. A bare `.bot` selector also matched the
       chat bubbles (`.msg.bot`) and pinned them to 70px, collapsing the text. */
    #buddy .bot {
      width: 70px;
      height: 78px;
      pointer-events: auto;
      cursor: pointer;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, .5));
      animation: bob 3.4s ease-in-out infinite;
    }

    #buddy.thinking .bot {
      animation: bob 1s ease-in-out infinite;
    }

    .bot-eyes {
      transform-box: fill-box;
      transform-origin: center;
      animation: blink 4.6s infinite;
    }

    #buddy.thinking .bot-eyes {
      animation: blink 1.2s infinite;
    }

    /* Pupils dart around while thinking */
    .bot-pupil {
      transform-box: fill-box;
      transform-origin: center;
    }

    #buddy.thinking .bot-pupil {
      animation: look 1.1s ease-in-out infinite;
    }

    @keyframes look {
      0%, 100% { transform: translate(0, 0); }
      30% { transform: translate(2.4px, -1px); }
      70% { transform: translate(-2.4px, 1px); }
    }

    @keyframes bob {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes blink {

      0%,
      93%,
      100% {
        transform: scaleY(1)
      }

      96% {
        transform: scaleY(.12)
      }
    }

    @keyframes glow {

      0%,
      100% {
        opacity: .55
      }

      50% {
        opacity: 1
      }
    }

    @keyframes ping {

      0%,
      100% {
        transform: scale(1);
        opacity: .7
      }

      50% {
        transform: scale(1.55);
        opacity: 1
      }
    }
  </style>
</head>

<body>
  <div class="col">
    <div id="chat">
      <div class="msg bot">
        <div class="answer">Ciao! I'm <b>Fusilli</b>, your Al Dente company-brain buddy 🍝 — ask me about open
          opportunities, stock levels, call complaints, product specs or the price list, and I'll dig through the data
          and cite my sources.</div>
      </div>
    </div>
    <div class="examples" id="examples"></div>
    <form id="form">
      <input id="q" autocomplete="off" placeholder="e.g. How many open opportunities does Primato have?" />
      <button class="send" id="send" type="submit">Ask</button>
    </form>

    <!-- Companion buddy -->
    <div id="buddy">
      <div class="bubble" id="bubble"></div>
      <svg class="bot" id="bot" viewBox="0 0 90 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="botBody" x1="0" y1="0" x2="1" y2="0.4">
            <stop offset="0%" stop-color="#aab2bd" />
            <stop offset="60%" stop-color="#929aa6" />
            <stop offset="100%" stop-color="#7e8693" />
          </linearGradient>
        </defs>
        <!-- neck / foot cylinder -->
        <rect x="38" y="78" width="16" height="15" rx="4" fill="#8b93a0" stroke="#1b1d22" stroke-width="3" />
        <ellipse cx="46" cy="78" rx="8" ry="2.6" fill="#aab2bd" stroke="#1b1d22" stroke-width="3" />
        <!-- dome body -->
        <path d="M16 84 L16 44 C16 15 74 15 74 44 L74 84 Z"
          fill="url(#botBody)" stroke="#1b1d22" stroke-width="3.4" stroke-linejoin="round" />
        <!-- subtle right-side shading -->
        <path d="M62 22 C71 30 71 40 71 44 L71 82 L66 82 L66 30 Z" fill="#1b1d22" opacity="0.08" />
        <!-- eyes -->
        <g class="bot-eyes">
          <circle cx="34" cy="48" r="9" fill="#f4f1e6" stroke="#1b1d22" stroke-width="3" />
          <circle cx="56" cy="48" r="9" fill="#f4f1e6" stroke="#1b1d22" stroke-width="3" />
          <circle class="bot-pupil" cx="34" cy="49" r="3.4" fill="#1b1d22" />
          <circle class="bot-pupil" cx="56" cy="49" r="3.4" fill="#1b1d22" />
        </g>
        <!-- smile -->
        <path d="M33 64 Q45 75 57 64" fill="none" stroke="#1b1d22" stroke-width="3" stroke-linecap="round" />
      </svg>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('q');
    const send = document.getElementById('send');

    // ---- Buddy state ----
    const buddy = document.getElementById('buddy');
    const bubble = document.getElementById('bubble');
    let bubbleTimer = null;
    const IDLE_TIPS = [
      "Try an example below 👇", "I cite every source.", "Ask me about a customer or a lot.",
      "I never make up numbers.", "Need a deck or a PDF? Just ask.",
    ];
    function say(text, sticky) {
      bubble.textContent = text;
      buddy.classList.add('show');
      clearTimeout(bubbleTimer);
      if (!sticky) bubbleTimer = setTimeout(() => buddy.classList.remove('show'), 4200);
    }
    function buddyThinking(on) {
      buddy.classList.toggle('thinking', on);
      if (on) say("Digging through the data…", true);
    }
    document.getElementById('bot').addEventListener('click', () =>
      say(IDLE_TIPS[Math.floor(Math.random() * IDLE_TIPS.length)]));
    setTimeout(() => say("Ciao! Ask me anything 🍝"), 700);

    const EXAMPLES = [
      "How many open opportunities does Primato Supermercati S.p.A. (CUST-0132) have, and their total value?",
      "Is SKU PAS-PEN-500 below its minimum stock?",
      "Total value of negotiation opportunities grouped by customer channel.",
      "What is the shelf life and allergens for Spaghetti n.5 - 500g box (PAS-SPA-500)?",
      "What is the profit margin on lot LOT-2026-0658?",
    ];
    const ex = document.getElementById('examples');
    EXAMPLES.forEach(t => {
      const b = document.createElement('button');
      b.textContent = t.length > 52 ? t.slice(0, 50) + '…' : t;
      b.onclick = () => { input.value = t; input.focus(); };
      ex.appendChild(b);
    });

    function addUser(text) {
      const d = document.createElement('div');
      d.className = 'msg user';
      const body = document.createElement('div');
      body.className = 'answer md';
      body.innerHTML = marked.parse(text, { breaks: true });
      d.appendChild(body);
      chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
    }
    function addBot() {
      const d = document.createElement('div');
      d.className = 'msg bot';
      d.innerHTML = '<div class="spinner">Thinking…</div>';
      chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
      return d;
    }
    function looksLikeHtml(s) { return /<\/?(html|div|section|table|h[1-9]|ul|style|!doctype)/i.test(s); }

    function renderAnswer(el, data) {
      const ans = data.answer || '';
      let html = '';
      if (looksLikeHtml(ans)) {
        const srcdoc = ans.replace(/"/g, '&quot;');
        html += `<div class="frame"><iframe sandbox="allow-same-origin" srcdoc="${srcdoc}"></iframe></div>`;
      } else {
        html += `<div class="answer md"></div>`;
      }
      html += `<div class="meta">`;
      if (data.verticale) html += `<span class="chip vert">${data.verticale}</span>`;
      (data.sources || []).forEach(s => {
        if (/^DOC-\d{3}$/.test(s)) {
          html += `<a class="chip src doc" href="/kb/${s}" data-doc="${s}" title="Open ${s}">📄 ${s}</a>`;
        } else {
          html += `<span class="chip src">${s}</span>`;
        }
      });
      html += `</div>`;
      if (data.artifact_url) {
        html += `<div class="artifact">📎 <a href="${data.artifact_url}" target="_blank" rel="noopener">Download artifact</a></div>`;
      }
      el.innerHTML = html;
      if (!looksLikeHtml(ans)) {
        const target = el.querySelector('.answer');
        target.innerHTML = marked.parse(ans, { breaks: true });
      }
      chat.scrollTop = chat.scrollHeight;
    }

    form.onsubmit = async (e) => {
      e.preventDefault();
      const question = input.value.trim();
      if (!question) return;
      addUser(question);
      input.value = ''; send.disabled = true;
      const bot = addBot();
      buddyThinking(true);
      try {
        const res = await fetch('/ask', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        renderAnswer(bot, data);
        say("Here's what I found! 🍝");
      } catch (err) {
        bot.innerHTML = `<div class="answer">Network error: ${err}</div>`;
        say("Hmm, I hit a snag.");
      } finally {
        buddyThinking(false);
        send.disabled = false; input.focus();
      }
    };

    // Open a cited document in the OS Preview app (falls back to a tab if standalone).
    function previewDoc(id) {
      if (window.parent && window.parent !== window && window.parent.openPreview) window.parent.openPreview(id);
      else window.open('/kb/' + id, '_blank');
    }
    chat.addEventListener('click', (e) => {
      const link = e.target.closest('a.chip.doc');
      if (!link) return;
      e.preventDefault();
      previewDoc(link.dataset.doc);
    });
  </script>
</body>

</html>
